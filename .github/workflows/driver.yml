name: recognize

on:
  push:

jobs:
  compromise:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        population: ["factor", "psychological", "responsibility", "conclusion", "preposition"]
        ring: ["mislead", "evening", "appointment", "glimpse"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar GB.jar
